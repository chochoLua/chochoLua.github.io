<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쵸록벽지</title>
    <style text="type/css">
        @font-face {
            font-family: 'Pretendard-Black';
            src: url('https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');
            font-weight: 900;
            font-style: normal;
        }

        body {
            height: 100vh;
            margin: 0 auto;
            position: relative;
        }

        #content {
            width: 100%;
            position: absolute;
        }

        .balloon {
            direction: ltr;
            font-family: 'Pretendard-Black';
            display: inline-block;
            position: relative;
        }

        .balloon img {
            width: 150px;
            max-height: 170px;
            object-fit: contain;
        }

        .info {
            padding: 5px 10px;
            border: 1px solid #bcbcbc;
            border-radius: 10px;
            background: #ffffff;
            text-align: center;
            text-shadow: -0.05em -0.05em 0em rgba(0, 0, 0, 0.8), -0.05em -0.025em 0em rgba(0, 0, 0, 0.8), -0.05em 0em 0em rgba(0, 0, 0, 0.8), -0.05em 0.025em 0em rgba(0, 0, 0, 0.8), -0.05em 0.05em 0em rgba(0, 0, 0, 0.8), -0.05em 0.075em 0em rgba(0, 0, 0, 0.8), -0.025em -0.05em 0em rgba(0, 0, 0, 0.8), -0.025em -0.025em 0em rgba(0, 0, 0, 0.8), -0.025em 0em 0em rgba(0, 0, 0, 0.8), -0.025em 0.025em 0em rgba(0, 0, 0, 0.8), -0.025em 0.05em 0em rgba(0, 0, 0, 0.8), -0.025em 0.075em 0em rgba(0, 0, 0, 0.8), 0em -0.05em 0em rgba(0, 0, 0, 0.8), 0em -0.025em 0em rgba(0, 0, 0, 0.8), 0em 0em 0.05em rgba(0, 0, 0, 0.8), 0em 0.025em 0.05em rgba(0, 0, 0, 0.8), 0em 0.05em 0.05em rgba(0, 0, 0, 0.8), 0em 0.075em 0.05em rgba(0, 0, 0, 0.8), 0.025em -0.05em 0em rgba(0, 0, 0, 0.8), 0.025em -0.025em 0em rgba(0, 0, 0, 0.8), 0.025em 0em 0.05em rgba(0, 0, 0, 0.8), 0.025em 0.025em 0.05em rgba(0, 0, 0, 0.8), 0.025em 0.05em 0.05em rgba(0, 0, 0, 0.8), 0.025em 0.075em 0.05em rgba(0, 0, 0, 0.8), 0.05em -0.05em 0em rgba(0, 0, 0, 0.8), 0.05em -0.025em 0em rgba(0, 0, 0, 0.8), 0.05em 0em 0.05em rgba(0, 0, 0, 0.8), 0.05em 0.025em 0.05em rgba(0, 0, 0, 0.8), 0.05em 0.05em 0.05em rgba(0, 0, 0, 0.8), 0.05em 0.075em 0.05em rgba(0, 0, 0, 0.8), 0.075em -0.05em 0em rgba(0, 0, 0, 0.8), 0.075em -0.025em 0em rgba(0, 0, 0, 0.8), 0.075em 0em 0.075em rgba(0, 0, 0, 0.8), 0.075em 0.025em 0.075em rgba(0, 0, 0, 0.8), 0.075em 0.05em 0.075em rgba(0, 0, 0, 0.8), 0.075em 0.075em 0.075em rgba(0, 0, 0, 0.8);
        }

        .nick {
            color: rgb(255, 224, 92);
        }

        .message {
            color: #ffffff;
        }

        .amount {
            position: absolute;
            left: 50%;
            top: 15%;
            transform: translateX(-50%);
            font-size: 1.8em;
            color: rgb(255, 0, 0);
            font-weight: 900;
        }

        .amount:before,
        .amount:after {
            display: block;
            content: attr(data-donation);
            color: #fff;
            -webkit-text-stroke: 0.15em #fff;
            z-index: -1;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .amount:after {
            color: #000;
            -webkit-text-stroke: 0.25em #000;
            z-index: -2;
        }

        #content {
            width: 100%;
            position: absolute;
            min-height: 100vh;
        }

        .balloon {
            direction: ltr;
            font-family: 'Pretendard-Black';
            display: inline-block;
            position: relative;
            user-select: none;
        }

        .balloon.manual-position {
            position: absolute !important;
            z-index: 999;
        }

        .info {
            padding: 5px 10px;
            border: 1px solid #bcbcbc;
            border-radius: 10px;
            background: #ffffff;
            text-align: center;
            cursor: grab;
        }

        .info.dragging {
            cursor: grabbing;
        }
    </style>
    <script>
        const config = {
            align: 'LEFT',
            position: 'TOP',
            stack: 'NONE'
        }

        const main = {
            list: [],
            manualPositions: {},
            detachedKeys: {}
        }

        const balloon = {}

        function getMessageText(data) {
            if (data.message !== undefined && data.message !== null && data.message !== '') {
                return data.message
            }
            return '별풍선 ' + data.amount + '개'
        }

        function getBalloonImageSrc(amount) {
            if (balloon[amount]) {
                return balloon[amount]
            }

            let step = 1
            const n = Number(amount)

            if (n <= 50) step = 2
            else if (n <= 100) step = 3
            else if (n <= 500) step = 4
            else if (n <= 1000) step = 5
            else step = 6

            return `https://res.sooplive.co.kr/new_player/items/ba_step${step}.png`
        }

        function isCustomImage(amount) {
            return !!balloon[amount]
        }

        function createBalloonImage(amount) {
            const img = document.createElement('img')
            img.src = getBalloonImageSrc(amount)
            img.alt = `balloon-${amount}`
            return img
        }

        function ensureBalloonImage(elBalloon) {
            let img = null

            for (let i = 0; i < elBalloon.children.length; i++) {
                const child = elBalloon.children[i]
                if (child.tagName && child.tagName.toLowerCase() === 'img') {
                    img = child
                    break
                }
            }

            if (!img) {
                img = createBalloonImage(elBalloon.dataset.amount)
                elBalloon.insertBefore(img, elBalloon.firstChild)
            } else if (!img.getAttribute('src')) {
                img.src = getBalloonImageSrc(elBalloon.dataset.amount)
            }

            return img
        }

        function ensureAmountLabel(elBalloon) {
            if (isCustomImage(elBalloon.dataset.amount)) {
                const exists = elBalloon.querySelector('.amount')
                if (exists) {
                    exists.remove()
                }
                return null
            }

            let elAmount = null
            for (let i = 0; i < elBalloon.children.length; i++) {
                const child = elBalloon.children[i]
                if (child.classList && child.classList.contains('amount')) {
                    elAmount = child
                    break
                }
            }

            if (!elAmount) {
                elAmount = document.createElement('div')
                elAmount.classList.add('amount')
                elAmount.innerText = elBalloon.dataset.amount
                elAmount.dataset.donation = elBalloon.dataset.amount
                elBalloon.append(elAmount)
            } else {
                elAmount.innerText = elBalloon.dataset.amount
                elAmount.dataset.donation = elBalloon.dataset.amount
            }

            return elAmount
        }

        function createBalloonShell(data, overrideKey) {
            const elBalloon = document.createElement('div')
            elBalloon.classList.add('balloon')
            elBalloon.dataset.key = overrideKey || data.key
            elBalloon.dataset.nick = data.nickname
            elBalloon.dataset.amount = data.amount
            return elBalloon
        }

        function createInfoElement(data) {
            const elInfo = document.createElement('div')
            elInfo.classList.add('info')

            const elNick = document.createElement('div')
            elNick.classList.add('nick')
            elNick.innerText = data.nickname

            const elMessage = document.createElement('div')
            elMessage.classList.add('message')
            elMessage.innerText = getMessageText(data)

            elInfo.dataset.key = data.key
            elInfo.dataset.nick = data.nickname
            elInfo.dataset.amount = data.amount
            elInfo.__data = {
                id: data.id,
                nickname: data.nickname,
                amount: data.amount,
                message: data.message,
                key: data.key
            }

            elInfo.append(elNick)
            elInfo.append(elMessage)

            bindInfoDrag(elInfo)
            return elInfo
        }

        function getDirectInfos(elBalloon) {
            const result = []
            for (let i = 0; i < elBalloon.children.length; i++) {
                const child = elBalloon.children[i]
                if (child.classList && child.classList.contains('info')) {
                    result.push(child)
                }
            }
            return result
        }

        function updateBalloonKeyFromInfo(elBalloon) {
            const infos = getDirectInfos(elBalloon)
            if (infos.length > 0) {
                elBalloon.dataset.key = infos[0].dataset.key
            }
        }

        function applyManualPosition(elBalloon, key) {
            const pos = main.manualPositions[key]
            if (!pos) return

            elBalloon.classList.add('manual-position')
            elBalloon.style.left = pos.left + 'px'
            elBalloon.style.top = pos.top + 'px'
            elBalloon.style.right = 'auto'
            elBalloon.style.bottom = 'auto'
        }

        function makeBalloonManual(elBalloon, forceKey) {
            const content = document.getElementById('content')
            const balloonRect = elBalloon.getBoundingClientRect()
            const contentRect = content.getBoundingClientRect()

            const left = balloonRect.left - contentRect.left
            const top = balloonRect.top - contentRect.top
            const saveKey = forceKey || elBalloon.dataset.key

            elBalloon.classList.add('manual-position')
            elBalloon.style.left = left + 'px'
            elBalloon.style.top = top + 'px'
            elBalloon.style.right = 'auto'
            elBalloon.style.bottom = 'auto'

            if (elBalloon.parentNode !== content) {
                content.appendChild(elBalloon)
            }

            main.manualPositions[saveKey] = { left, top }
            return { left, top }
        }

        function moveBalloonToPointer(elBalloon, clientX, clientY, offsetX, offsetY, saveKey) {
            const content = document.getElementById('content')
            const rect = content.getBoundingClientRect()

            let left = clientX - rect.left - offsetX
            let top = clientY - rect.top - offsetY

            const maxLeft = Math.max(0, content.clientWidth - elBalloon.offsetWidth)
            const maxTop = Math.max(0, content.clientHeight - elBalloon.offsetHeight)

            left = Math.max(0, Math.min(left, maxLeft))
            top = Math.max(0, Math.min(top, maxTop))

            elBalloon.style.left = left + 'px'
            elBalloon.style.top = top + 'px'

            main.manualPositions[saveKey || elBalloon.dataset.key] = { left, top }
            return { left, top }
        }

        function appendInfoToBalloon(elBalloon, elInfo) {
            ensureBalloonImage(elBalloon)
            elBalloon.append(elInfo)
            ensureAmountLabel(elBalloon)
        }

        function createDetachedBalloonFromInfo(elInfo, sourceBalloon) {
            const data = elInfo.__data || {
                nickname: elInfo.dataset.nick,
                amount: elInfo.dataset.amount,
                message: '',
                key: elInfo.dataset.key
            }

            const detachedKey = data.key
            const newBalloon = createBalloonShell(data, detachedKey)
            appendInfoToBalloon(newBalloon, elInfo)
            document.getElementById('content').append(newBalloon)

            main.detachedKeys[detachedKey] = true

            updateBalloonKeyFromInfo(sourceBalloon)
            ensureBalloonImage(sourceBalloon)
            ensureAmountLabel(sourceBalloon)

            return newBalloon
        }

        function findStackTarget(data) {
            if (main.detachedKeys[data.key]) {
                return null
            }

            if (config.stack === 'NICK') {
                return document.querySelector(`.balloon[data-nick="${data.nickname}"]:not(.manual-position)`)
            }

            if (config.stack === 'AMOUNT') {
                return document.querySelector(`.balloon[data-amount="${data.amount}"]:not(.manual-position)`)
            }

            return null
        }

        function bindInfoDrag(elInfo) {
            let isDragging = false
            let sourceBalloon = null
            let dragBalloon = null
            let dragKey = null
            let offsetX = 0
            let offsetY = 0
            let pendingSplit = false

            const startDrag = (clientX, clientY) => {
                sourceBalloon = elInfo.closest('.balloon')
                if (!sourceBalloon) return

                const infos = getDirectInfos(sourceBalloon)
                const isStackMode = config.stack === 'NICK' || config.stack === 'AMOUNT'
                pendingSplit = isStackMode && infos.length > 1

                if (!pendingSplit) {
                    dragBalloon = sourceBalloon
                    dragKey = elInfo.dataset.key || sourceBalloon.dataset.key

                    if (!dragBalloon.classList.contains('manual-position')) {
                        makeBalloonManual(dragBalloon, dragKey)
                    }

                    const rect = dragBalloon.getBoundingClientRect()
                    offsetX = clientX - rect.left
                    offsetY = clientY - rect.top
                } else {
                    dragBalloon = null
                    dragKey = elInfo.dataset.key
                }

                isDragging = true
                elInfo.classList.add('dragging')
            }

            const moveDrag = (clientX, clientY) => {
                if (!isDragging) return
                if (!dragBalloon) return

                moveBalloonToPointer(dragBalloon, clientX, clientY, offsetX, offsetY, dragKey)
            }

            const endDrag = (clientX, clientY) => {
                if (!isDragging) return

                isDragging = false
                elInfo.classList.remove('dragging')

                if (pendingSplit && sourceBalloon) {
                    dragBalloon = createDetachedBalloonFromInfo(elInfo, sourceBalloon)
                    dragKey = elInfo.dataset.key

                    const rect = dragBalloon.getBoundingClientRect()
                    const contentRect = document.getElementById('content').getBoundingClientRect()

                    const currentLeft = rect.left - contentRect.left
                    const currentTop = rect.top - contentRect.top

                    dragBalloon.classList.add('manual-position')
                    dragBalloon.style.left = currentLeft + 'px'
                    dragBalloon.style.top = currentTop + 'px'
                    dragBalloon.style.right = 'auto'
                    dragBalloon.style.bottom = 'auto'

                    offsetX = Math.min(rect.width / 2, 40)
                    offsetY = Math.min(rect.height / 2, 30)

                    moveBalloonToPointer(dragBalloon, clientX, clientY, offsetX, offsetY, dragKey)
                }

                pendingSplit = false
                sourceBalloon = null
                dragBalloon = null
                dragKey = null
            }

            elInfo.addEventListener('mousedown', (e) => {
                e.preventDefault()
                startDrag(e.clientX, e.clientY)
            })

            document.addEventListener('mousemove', (e) => {
                moveDrag(e.clientX, e.clientY)
            })

            document.addEventListener('mouseup', (e) => {
                endDrag(e.clientX, e.clientY)
            })

            elInfo.addEventListener('touchstart', (e) => {
                const t = e.touches[0]
                if (!t) return
                startDrag(t.clientX, t.clientY)
            }, { passive: true })

            document.addEventListener('touchmove', (e) => {
                if (!isDragging) return
                const t = e.touches[0]
                if (!t) return
                e.preventDefault()
                moveDrag(t.clientX, t.clientY)
            }, { passive: false })

            document.addEventListener('touchend', (e) => {
                if (!isDragging) return
                const t = e.changedTouches && e.changedTouches[0]
                if (t) endDrag(t.clientX, t.clientY)
                else endDrag(0, 0)
            })
        }

        const render = (data) => {
            const elInfo = createInfoElement(data)
            const content = document.getElementById('content')

            if (config.stack === 'NONE') {
                const elBalloon = createBalloonShell(data)
                appendInfoToBalloon(elBalloon, elInfo)
                content.append(elBalloon)
                applyManualPosition(elBalloon, data.key)
                return
            }

            const stackTarget = findStackTarget(data)

            if (stackTarget) {
                appendInfoToBalloon(stackTarget, elInfo)
                updateBalloonKeyFromInfo(stackTarget)
                return
            }

            const elBalloon = createBalloonShell(data)
            appendInfoToBalloon(elBalloon, elInfo)
            content.append(elBalloon)
            applyManualPosition(elBalloon, data.key)
        }

        const renderAll = () => {
            const content = document.getElementById('content')
            content.innerHTML = ''
            content.style.direction = config.align === 'LEFT' ? 'ltr' : 'rtl'
            content.style.top = config.position === 'TOP' ? '0' : ''
            content.style.bottom = config.position === 'BOTTOM' ? '0' : ''

            main.detachedKeys = {}

            main.list.forEach((r) => {
                render(r)
            })

            document.querySelectorAll('.balloon').forEach((elBalloon) => {
                ensureBalloonImage(elBalloon)
                ensureAmountLabel(elBalloon)
            })
        }

        const socket = {
            ws: null,
            connected: false,
            streamerId: '',
            imageList: [],
            connect() {
                this.ws = new WebSocket('ws://localhost:3000')

                this.ws.onopen = () => {
                    this.connected = true
                }

                this.ws.onmessage = (event) => {
                    const data = JSON.parse(event.data)

                    if (data.type === 'initData') {
                        main.list = [...JSON.parse(decodeURIComponent(data.content)) || []]
                        this.streamerId = data.streamerId
                        this.imageList = data.imageList || []
                        config.align = data.align || 'LEFT'
                        config.stack = data.stack || 'NONE'
                        config.position = data.position || 'TOP'

                        if (this.streamerId) {
                            this.getData().then(() => {
                                this.getImage()
                            })
                        }
                    }
                    else if (data.type === 'connect') {
                        main.list = [...JSON.parse(decodeURIComponent(data.content)) || []]
                        this.streamerId = data.streamerId
                        this.imageList = data.imageList || []
                        config.align = data.align || 'LEFT'
                        config.stack = data.stack || 'NONE'
                        config.position = data.position || 'TOP'

                        if (this.streamerId) {
                            this.getData().then(() => {
                                this.getImage()
                            })
                        }
                    }
                    else if (data.type === 'balloon') {
                        if (!main.list.some((r) => r.key === data.content.key)) {
                            main.list = [...main.list, data.content]
                            render(data.content)
                        }
                    }
                    else if (data.type === 'remove') {
                        const key = data.content

                        if (key === 'all') {
                            main.list.splice(0, main.list.length)
                            main.manualPositions = {}
                            main.detachedKeys = {}
                        }
                        else {
                            const idx = main.list.findIndex((r) => r.key === key)
                            if (idx > -1) {
                                main.list.splice(idx, 1)
                            }

                            delete main.manualPositions[key]
                            delete main.detachedKeys[key]

                            document.querySelectorAll(`[data-key="${key}"]`).forEach((el) => {
                                el.remove()
                            })
                        }

                        renderAll()
                    }
                    else if (data.type === 'image') {
                        this.imageList = data.imageList
                        if (this.streamerId) {
                            this.getData().then(() => {
                                this.getImage()
                            })
                        }
                    }
                }

                this.ws.onclose = () => {
                    this.connected = false
                }
            },

            getData() {
                return fetch(`http://localhost:3000/api/data?streamerId=${this.streamerId}`)
                    .then(async (res) => {
                        const json = await res.json()
                        Object.keys(json).forEach((k) => {
                            balloon[k] = json[k]
                        })
                    })
            },

            getImage() {
                this.imageList.forEach((r) => {
                    balloon[r.amount] = r.url
                })
                renderAll()
            }
        }

        setInterval(() => {
            if (!socket.connected) {
                socket.connect()
            }
        }, 1000)
    </script>
</head>

<body>
    <div id="content"></div>
</body>
